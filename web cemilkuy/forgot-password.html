<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Cemilkuy</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #FF7F50 0%, #ff9f43 100%); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; font-family: 'Open Sans', sans-serif; 
        }
        .btn-back {
            position: absolute; top: 25px; left: 25px; text-decoration: none; color: #fff; font-weight: bold; font-size: 14px;
            display: flex; align-items: center; gap: 8px; padding: 10px 15px; background: rgba(255,255,255,0.2);
            border-radius: 30px; backdrop-filter: blur(5px); transition: 0.3s;
        }
        .btn-back:hover { background: white; color: #FF7F50; }
        .box { 
            background: white; padding: 40px; border-radius: 20px; width: 380px; text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .icon-lock {
            width: 80px; height: 80px; background: #fff5f2; border-radius: 50%;
            display: inline-flex; justify-content: center; align-items: center;
            font-size: 35px; color: #FF7F50; margin-bottom: 20px;
            border: 3px solid #FF7F50;
        }
        h2 { font-family: 'Fredoka One', cursive; margin: 0 0 10px; color: #333; }
        p.subtitle { color: #888; font-size: 13px; margin-bottom: 25px; line-height: 1.6; }
        .input-group { position: relative; margin-bottom: 15px; text-align: left; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #aaa; }
        input { 
            width: 100%; padding: 12px 12px 12px 45px; border: 2px solid #f1f2f6; 
            border-radius: 10px; box-sizing: border-box; font-size: 14px; transition: 0.3s; background: #fafafa;
        }
        input:focus { border-color: #FF7F50; outline: none; background: white; }
        .btn-wa { 
            width: 100%; padding: 14px; background: #25D366; color: white; border: none; 
            border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; 
            transition: 0.3s; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-wa:hover { background: #128C7E; transform: translateY(-2px); }
        .btn-wa:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .error-msg { color: #dc3545; font-size: 13px; margin-top: 8px; display: none; }
        .info-box {
            background: #fff3cd; border: 1px solid #ffc107; border-radius: 10px;
            padding: 12px 15px; margin-bottom: 20px; font-size: 13px; color: #856404; text-align: left;
        }
        .info-box i { margin-right: 8px; }
        .links { margin-top: 20px; font-size: 13px; color: #666; }
        .links a { color: #FF7F50; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <a href="login.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali Login</a>

    <div class="box">
        <div class="icon-lock"><i class="fas fa-lock"></i></div>
        <h2>Lupa Password?</h2>
        <p class="subtitle">Masukkan username kamu, kami akan hubungkan ke Admin Cemilkuy untuk reset password.</p>

        <div class="info-box">
            <i class="fas fa-info-circle"></i>
            Admin akan memverifikasi identitasmu dan mereset password via WhatsApp.
        </div>

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="Masukkan Username kamu">
        </div>

        <div class="input-group">
            <i class="fas fa-phone"></i>
            <input type="text" id="phone" placeholder="Nomor WhatsApp kamu (08xxx)">
        </div>

        <p class="error-msg" id="error-msg"></p>

        <button class="btn-wa" id="btn-wa" onclick="hubungiAdmin()">
            <i class="fab fa-whatsapp"></i> Hubungi Admin via WhatsApp
        </button>

        <div class="links">
            <p>Sudah ingat password? <a href="login.html">Login disini</a></p>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        async function hubungiAdmin() {
            const username = document.getElementById('username').value.trim();
            const phone    = document.getElementById('phone').value.trim();
            const btn      = document.getElementById('btn-wa');
            const errorMsg = document.getElementById('error-msg');

            if (!username || !phone) {
                tampilError('Username dan nomor WhatsApp wajib diisi!');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
            errorMsg.style.display = 'none';

            try {
                const res  = await fetch(`${API_URL}/auth/check-username/${username}`);
                const data = await res.json();

                if (!data.exists) {
                    tampilError('Username tidak ditemukan. Pastikan username sudah benar.');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fab fa-whatsapp"></i> Hubungi Admin via WhatsApp';
                    return;
                }

                const pesan = `Halo Admin Cemilkuy!%0A%0ASaya lupa password dan butuh bantuan reset.%0A%0A*Detail Akun:*%0AUsername: ${username}%0ANomor WA: ${phone}%0A%0AMohon bantu reset password saya. Terima kasih!`;

                window.open(`https://wa.me/6285810533390?text=${pesan}`, '_blank');

                document.querySelector('.box').innerHTML = `
                    <div style="text-align:center; padding: 20px;">
                        <div style="font-size:60px; margin-bottom:20px;">✅</div>
                        <h2 style="font-family:'Fredoka One',cursive; color:#333;">Permintaan Terkirim!</h2>
                        <p style="color:#666; margin:15px 0; line-height:1.6;">
                            Pesan sudah dikirim ke WhatsApp Admin.<br>
                            Tunggu konfirmasi dari Admin Cemilkuy ya!
                        </p>
                        <p style="color:#888; font-size:13px; margin-bottom:25px;">
                            Biasanya diproses dalam <strong>1x24 jam</strong>
                        </p>
                        <a href="login.html" style="background:#FF7F50; color:white; padding:12px 30px; border-radius:10px; text-decoration:none; font-weight:bold;">
                            Kembali ke Login
                        </a>
                    </div>`;

            } catch (err) {
                tampilError('Tidak bisa terhubung ke server. Pastikan backend berjalan.');
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-whatsapp"></i> Hubungi Admin via WhatsApp';
            }
        }

        function tampilError(pesan) {
            const el = document.getElementById('error-msg');
            el.innerText = pesan;
            el.style.display = 'block';
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') hubungiAdmin();
        });
    </script>
</body>
</html>
