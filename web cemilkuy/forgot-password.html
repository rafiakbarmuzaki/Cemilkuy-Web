<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Cemilkuy</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- STYLE SAMA SEPERTI SEBELUMNYA --- */
        body { background: linear-gradient(135deg, #FF7F50 0%, #ff9f43 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Open Sans', sans-serif; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .login-logo { width: 80px; height: 80px; object-fit: cover; border-radius: 50%; border: 3px solid #FF7F50; padding: 3px; background: white; margin: 0 auto 15px; display: block; }
        h2 { font-family: 'Fredoka One'; color: #333; margin-bottom: 10px; }
        p.desc { color: #666; font-size: 13px; margin-bottom: 25px; line-height: 1.5; }
        .input-group { position: relative; margin-bottom: 15px; text-align: left; }
        .input-group label { font-weight: bold; font-size: 12px; color: #555; margin-bottom: 5px; display: block; }
        .input-group i { position: absolute; left: 15px; top: 38px; color: #aaa; width: 20px; text-align: center; }
        input, select { width: 100%; padding: 12px 12px 12px 45px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input:focus, select:focus { border-color: #FF7F50; outline: none; }
        .btn-submit { width: 100%; padding: 12px; background: #FF7F50; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; font-size: 15px; }
        .btn-submit:hover { background: #e06b3e; transform: translateY(-2px); }
        .back-link { margin-top: 20px; display: block; font-size: 13px; color: #777; text-decoration: none; font-weight: 600; }
        .back-link:hover { color: #FF7F50; }
        #step-2 { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <img src="gambar/logo.jpg" alt="Logo" class="login-logo">
        
        <h2>Lupa Password?</h2>
        <p class="desc">Verifikasi akun Anda dengan memasukkan data yang sesuai.</p>

        <div id="step-1">
            <div class="input-group">
                <label>Saya Adalah</label>
                <i class="fas fa-users-cog"></i>
                <select id="role-select">
                    <option value="seller">Penjual (Toko)</option>
                    <option value="admin">Admin Pusat</option>
                </select>
            </div>

            <div class="input-group">
                <label>Username</label>
                <i class="fas fa-user"></i>
                <input type="text" id="check-user" placeholder="Username Anda">
            </div>
            
            <div class="input-group">
                <label>Nomor WhatsApp Terdaftar</label>
                <i class="fab fa-whatsapp"></i>
                <input type="number" id="check-phone" placeholder="Contoh: 08123456789">
            </div>

            <button class="btn-submit" onclick="verifyUser()">Verifikasi Akun</button>
        </div>

        <div id="step-2">
            <div class="input-group">
                <label>Password Baru</label>
                <i class="fas fa-lock"></i>
                <input type="password" id="new-pass" placeholder="Minimal 3 karakter">
            </div>
            <button class="btn-submit" onclick="saveNewPassword()">Simpan Password</button>
        </div>

        <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Login</a>
    </div>

    <script>
        let foundIndex = -1; 
        let targetDB = ""; // Menyimpan apakah ini reset 'cemilkuy_users' atau 'cemilkuy_admins'

        function verifyUser() {
            const role = document.getElementById('role-select').value;
            const usernameInput = document.getElementById('check-user').value.trim();
            const phoneInput = document.getElementById('check-phone').value.trim();

            if(!usernameInput || !phoneInput) return alert("Mohon isi Username dan Nomor WA!");

            // Tentukan Database mana yang dicek
            if (role === 'admin') {
                targetDB = 'cemilkuy_admins';
            } else {
                targetDB = 'cemilkuy_users';
            }

            // Ambil Data
            let data = JSON.parse(localStorage.getItem(targetDB)) || [];

            // Cari User
            foundIndex = data.findIndex(u => u.username === usernameInput && u.phone === phoneInput);

            if (foundIndex !== -1) {
                alert(`Verifikasi Berhasil! Halo ${data[foundIndex].name}, silakan buat password baru.`);
                document.getElementById('step-1').style.display = 'none';
                document.getElementById('step-2').style.display = 'block';
            } else {
                alert("Data tidak cocok! Pastikan Username dan Nomor WA sesuai.");
            }
        }

        function saveNewPassword() {
            const newPass = document.getElementById('new-pass').value;

            if (newPass.length < 3) return alert("Password terlalu pendek!");

            let data = JSON.parse(localStorage.getItem(targetDB));
            data[foundIndex].password = newPass;
            localStorage.setItem(targetDB, JSON.stringify(data));

            alert("Berhasil! Password telah diganti. Silakan Login.");
            window.location.href = 'login.html';
        }
    </script>

</body>
</html>
