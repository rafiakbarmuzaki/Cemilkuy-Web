<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - Cemilkuy</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { 
            background: #f4f7f6; 
            font-family: 'Open Sans', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }

        .profile-card {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        .card-header {
            background: linear-gradient(135deg, #FF7F50 0%, #ff9f43 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            color: #FF7F50;
            border: 4px solid rgba(255,255,255,0.3);
            margin-bottom: 10px;
        }

        .card-header h2 { margin: 0; font-family: 'Fredoka One', cursive; letter-spacing: 1px; }
        .card-header p { margin: 5px 0 0; opacity: 0.9; font-size: 14px; }

        .card-body { padding: 30px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 13px; }
        .form-group input {
            width: 100%; padding: 12px; border: 2px solid #eee; 
            border-radius: 10px; font-size: 14px; transition: 0.3s;
            box-sizing: border-box; background: #fafafa;
        }
        .form-group input:focus { border-color: #FF7F50; outline: none; background: white; }
        .form-group input:disabled { background: #eee; color: #888; cursor: not-allowed; }

        .btn-save {
            width: 100%; padding: 12px; background: #28a745; color: white; border: none;
            border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-save:hover { background: #218838; transform: translateY(-2px); }

        .btn-logout {
            width: 100%; padding: 12px; background: #fff; color: #dc3545; border: 2px solid #dc3545;
            border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s;
            margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-logout:hover { background: #dc3545; color: white; }

        .back-link {
            display: block; text-align: center; margin-top: 20px; 
            color: #FF7F50; text-decoration: none; font-weight: bold; font-size: 14px;
        }
        .back-link:hover { text-decoration: underline; }

        .badge-member {
            background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px;
            font-size: 12px; font-weight: bold; margin-top: 10px; display: inline-block;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="card-header">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <h2 id="display-name">Nama User</h2>
            <div class="badge-member">MEMBER CEMILKUY</div>
        </div>

        <div class="card-body">
            <div class="form-group">
                <label>Username (Tidak bisa diubah)</label>
                <input type="text" id="username" disabled>
            </div>
            
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="fullname" placeholder="Masukkan nama lengkap">
            </div>

            <div class="form-group">
                <label>Nomor WhatsApp</label>
                <input type="number" id="phone" placeholder="08xxxxxxxx">
            </div>

            <div class="form-group">
                <label>Password Baru (Opsional)</label>
                <input type="text" id="password" placeholder="Isi jika ingin ganti password">
            </div>

            <button class="btn-save" onclick="saveProfile()">
                <i class="fas fa-save"></i> Simpan Perubahan
            </button>

            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>

            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali Belanja</a>
        </div>
    </div>

    <script>
        // --- 1. CEK LOGIN ---
        const session = JSON.parse(localStorage.getItem('cemilkuy_session'));
        
        if (!session) {
            alert("Silakan login dulu!");
            window.location.href = 'login.html';
        }

        // --- 2. ISI DATA FORM ---
        document.getElementById('display-name').innerText = session.name;
        document.getElementById('username').value = session.username;
        document.getElementById('fullname').value = session.name;
        document.getElementById('phone').value = session.phone;
        // Password sengaja dikosongkan agar tidak terpampang, user isi baru jika ingin ubah

        // --- 3. FUNGSI SIMPAN PROFILE ---
        function saveProfile() {
            const newName = document.getElementById('fullname').value;
            const newPhone = document.getElementById('phone').value;
            const newPass = document.getElementById('password').value;

            if(!newName || !newPhone) return alert("Nama dan Nomor HP tidak boleh kosong!");

            // Ambil database users
            let users = JSON.parse(localStorage.getItem('cemilkuy_users')) || [];
            
            // Cari user yang sedang login berdasarkan username
            const userIndex = users.findIndex(u => u.username === session.username);
            
            if (userIndex !== -1) {
                // Update Data
                users[userIndex].name = newName;
                users[userIndex].phone = newPhone;
                
                // Update Password hanya jika diisi
                if (newPass) {
                    users[userIndex].password = newPass;
                }

                // Simpan ke LocalStorage Utama
                localStorage.setItem('cemilkuy_users', JSON.stringify(users));

                // Update Session saat ini juga agar tampilan langsung berubah
                session.name = newName;
                session.phone = newPhone;
                if (newPass) session.password = newPass;
                localStorage.setItem('cemilkuy_session', JSON.stringify(session));

                alert("Profil berhasil diperbarui!");
                location.reload(); // Refresh halaman
            } else {
                alert("Error: Data user tidak ditemukan di database.");
            }
        }

        // --- 4. FUNGSI LOGOUT ---
        function logout() {
            if(confirm("Yakin ingin keluar dari akun?")) {
                localStorage.removeItem('cemilkuy_session');
                window.location.href = 'login.html';
            }
        }
    </script>

</body>
</html>
