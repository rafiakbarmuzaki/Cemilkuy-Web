<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cemilkuy</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- GLOBAL STYLE --- */
        body { 
            background: linear-gradient(135deg, #FF7F50 0%, #ff9f43 100%); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; font-family: 'Open Sans', sans-serif; 
        }
        .btn-back-home {
            position: absolute; top: 25px; left: 25px; text-decoration: none; color: #fff; font-weight: bold; font-size: 14px;
            display: flex; align-items: center; gap: 8px; padding: 10px 15px; background: rgba(255, 255, 255, 0.2);
            border-radius: 30px; backdrop-filter: blur(5px); transition: 0.3s;
        }
        .btn-back-home:hover { background: white; color: #FF7F50; }
        
        .login-box { 
            background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .login-logo {
            width: 90px; height: 90px; object-fit: cover; border-radius: 50%;
            border: 3px solid #FF7F50; padding: 3px; background: white; margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(255, 127, 80, 0.2);
        }
        h2 { font-family: 'Fredoka One', cursive; margin: 0 0 25px; color: #333; letter-spacing: 1px; }
        
        .input-group { position: relative; margin-bottom: 15px; text-align: left; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #aaa; width: 20px; text-align: center; }
        
        .toggle-password {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #aaa; left: auto;
        }

        input { 
            width: 100%; padding: 12px 12px 12px 45px; margin: 0; border: 2px solid #f1f2f6; 
            border-radius: 10px; box-sizing: border-box; font-size: 14px; transition: 0.3s; background: #fafafa;
        }
        input:focus { border-color: #FF7F50; outline: none; background: white; }
        
        .btn-login { 
            width: 100%; padding: 12px; background: #FF7F50; color: white; border: none; 
            border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; 
            transition: 0.3s; margin-top: 15px; box-shadow: 0 5px 15px rgba(255, 127, 80, 0.3);
        }
        .btn-login:hover { background: #e06b3e; transform: translateY(-2px); }
        
        .links { margin-top: 25px; font-size: 13px; color: #666; display: flex; flex-direction: column; gap: 8px; }
        .links a { color: #FF7F50; text-decoration: none; font-weight: bold; }
        .links a:hover { text-decoration: underline; }
        .divider { border-top: 1px solid #eee; margin: 10px 0; }
    </style>
</head>
<body>

    <a href="index.html" class="btn-back-home"><i class="fas fa-arrow-left"></i> Kembali ke Menu</a>

    <div class="login-box">
        <img src="gambar/logo.jpg" alt="Logo Cemilkuy" class="login-logo">
        <h2>Login Cemilkuy</h2>
        
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="Username">
        </div>
        
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Password">
            <i class="fas fa-eye toggle-password" onclick="togglePass()"></i>
        </div>

        <button class="btn-login" onclick="login()">Masuk Sekarang</button>
        
        <div class="links">
            <p>Belum punya akun? <a href="register-user.html">Daftar Member</a></p>
            <div class="divider"></div>
            <p>Ingin jualan? <a href="register.html">Buka Toko Disini</a></p>
        </div>
    </div>

    <script>
        // --- 1. SETTING ADMIN ---
        const latestAdmins = [
            { username: "Razan", password: "Razan123", role: "admin", name: "Razan (CEO)", shop: "Pusat HQ", phone: "085161175387" },
            { username: "Fathan", password: "Batak123", role: "admin", name: "Fathan (CEO)", shop: "Pusat Ops", phone: "085810533390" },
            { username: "Rafi", password: "Rabar123", role: "admin", name: "Rafi (CEO)", shop: "Pusat Fin", phone: "081818862411" },
            { username: "Revitha", password: "Revitha123", role: "admin", name: "Revitha (Management)", shop: "Pusat Management", phone: "082213635611"},
            { username: "Hima", password: "Hima123", role: "admin", name: "Hima (Management)", shop: "Pusat Management", phone: "081295534887"},
        ];

        function refreshAdminData() {
            localStorage.setItem('cemilkuy_admins', JSON.stringify(latestAdmins));
        }

        // --- 2. LOGIKA LOGIN ---
        function login() {
            const u = document.getElementById('username').value.trim(); 
            const p = document.getElementById('password').value.trim();

            if (!u || !p) {
                alert("Username dan Password tidak boleh kosong!");
                return;
            }

            refreshAdminData();

            // Cek Admin
            const admins = JSON.parse(localStorage.getItem('cemilkuy_admins'));
            const foundAdmin = admins.find(acc => acc.username === u && acc.password === p);

            if (foundAdmin) {
                localStorage.setItem('cemilkuy_session', JSON.stringify(foundAdmin));
                alert(`Selamat datang, Boss ${foundAdmin.name}!`);
                window.location.href = 'dashboard.html';
                return; 
            }

            // Cek Users (Bisa Penjual atau Member/Pembeli)
            const users = JSON.parse(localStorage.getItem('cemilkuy_users')) || [];
            const foundUser = users.find(user => user.username === u && user.password === p);

            if (foundUser) {
                localStorage.setItem('cemilkuy_session', JSON.stringify(foundUser));
                
                // Logika pembeda sapaan berdasarkan Role
                if (foundUser.role === 'seller') {
                    alert(`Halo Juragan ${foundUser.name}, selamat berjualan!`);
                    window.location.href = 'dashboard.html'; // Nanti bisa diganti ke dashboard-seller.html
                } else {
                    alert(`Halo Kak ${foundUser.name}, selamat datang di Cemilkuy!`);
                    window.location.href = 'index.html'; // Pembeli biasanya masuk ke halaman utama belanja
                }
                
            } else {
                alert("Username atau Password salah! (Cek huruf besar/kecil)");
                
                // Animasi getar kalau salah
                const box = document.querySelector('.login-box');
                box.animate([
                    { transform: 'translateX(0px)' }, 
                    { transform: 'translateX(10px)' }, 
                    { transform: 'translateX(-10px)' }, 
                    { transform: 'translateX(0px)' }
                ], { duration: 300 });
            }
        }

        function togglePass() {
            const passInput = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            if (passInput.type === "password") {
                passInput.type = "text";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passInput.type = "password";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        refreshAdminData();
    </script>
</body>
</html>
